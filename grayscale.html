<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ben Gibbons - Grayscale</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .grayscaleFrame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      filter: grayscale(1) saturate(0) contrast(1.08) brightness(0.92);
      background: #000;
    }

    .label {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.72);
      color: #f2f2f2;
      border: 1px solid rgba(255, 255, 255, 0.35);
      padding: 6px 10px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="label">Grayscale Compare</div>
  <iframe class="grayscaleFrame" src="index.html" title="Grayscale version of Ben Gibbons website"></iframe>
</body>
</html>
